# ===================== Bluetooth Configuration =====================
# Maximum connection interval (1.25ms units, 9 = 11.25ms)
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
# Connection latency (number of connection events the peripheral can skip)
CONFIG_BT_PERIPHERAL_PREF_LATENCY=16
# ACL packet transmit buffer count
CONFIG_BT_BUF_ACL_TX_COUNT=32
# L2CAP layer transmit buffer count
CONFIG_BT_L2CAP_TX_BUF_COUNT=32
# Bluetooth transmit power +8dBm (maximum)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Enable Bluetooth battery service
CONFIG_BT_BAS=y

# ===================== Auto Sleep =====================
# Enable auto sleep
CONFIG_ZMK_SLEEP=y
# Time before entering deep sleep (ms) — 3600000ms = 1 hour
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
# Time before entering idle state (ms) — 15000ms = 15 seconds
CONFIG_ZMK_IDLE_TIMEOUT=15000

# ===================== BLE Experimental Features =====================
# Enable experimental BLE connection features
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# Central side fetches peripheral battery level
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# Central side proxies peripheral battery level
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
# Behavior queue size — improves macro/combo responsiveness
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# ===================== Display =====================
# Enable display support
CONFIG_ZMK_DISPLAY=y
# Blank display when keyboard is idle
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# ===================== SPI & Input Devices =====================
# Enable SPI bus support
CONFIG_SPI=y
# Enable input device support
CONFIG_INPUT=y
# Enable external power detection
CONFIG_ZMK_EXT_POWER=y

# ===================== Power Control =====================
# Do not modify the following — used to power certain keyboard peripherals, unrelated to RGB underglow
CONFIG_ZMK_BACKLIGHT=y
# Backlight brightness at boot: 100%
CONFIG_ZMK_BACKLIGHT_BRT_START=100
# Automatically enable backlight at boot
CONFIG_ZMK_BACKLIGHT_ON_START=y
# Do not auto-disable backlight when idle
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=n

# ===================== Pin Control =====================
# Enable pin control
CONFIG_PINCTRL=y

# ===================== Pointing Device (Mouse) =====================
# Enable pointing device support
CONFIG_ZMK_POINTING=y
# Enable smooth scrolling
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n

# ===================== USB Logging =====================
# Enable USB log output
CONFIG_ZMK_USB_LOGGING=n

# ===================== RGB Underglow =====================
# Enable WS2812 LED strip support
CONFIG_WS2812_STRIP=y
# Enable RGB underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
# Do not auto-enable RGB underglow at boot
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
# Auto-disable RGB underglow when idle
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# Initial RGB hue (160 = green range)
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=160
# Initial RGB effect (effect #3)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
# RGB toggle also controls the power output rail
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
# Initial RGB brightness (20% — avoids blinding on first toggle)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20

# ========== Optional settings (uncomment if needed) ==========
# Auto-disable RGB underglow when USB is disconnected
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y

# Debounce timing — increase if double-triggering occurs
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=4
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=2

# Enable 32kHz crystal
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_30PPM=y

# Enable EC11 rotary encoder support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_GPIO=y
